name: Build Android APK

on:
  push:
    branches:
      - main  # This runs every time you "Push" from FlutterFlow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from your repository
      - uses: actions/checkout@v3

      # 2. Set up Java (needed for Android)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Or your current FlutterFlow version

      # 4. Get the app's building blocks
      - name: Install dependencies
        run: flutter pub get

      # 5. Create the APK
      - name: Build APK
        run: flutter build apk --release

      # 6. Save the APK so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
